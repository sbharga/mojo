name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cargo fmt --check --manifest-path engine/Cargo.toml
      - run: cargo clippy --manifest-path engine/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path engine/Cargo.toml
      - run: npm ci --prefix web
      - run: cargo install wasm-pack --locked
      - run: npm run build --prefix web
      - run: npm run check --prefix web
      - run: cargo install twiggy --locked
      - run: twiggy top -n 20 engine/pkg/mojo_engine_bg.wasm > twiggy-top.txt
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-size-profile
          path: twiggy-top.txt
